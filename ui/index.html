<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anonpic</title>
    <script type="module" src="/src/main.js" defer></script>
  </head>

  <body>
    <header class="titlebar">
      <h1>Anonpic</h1>
    </header>

    <nav class="tabs" role="tablist">
      <button id="tab-capture" class="tab is-active" type="button" role="tab" aria-selected="true" aria-controls="capture-tab">
        Capture
      </button>
      <button id="tab-settings" class="tab" type="button" role="tab" aria-selected="false" aria-controls="settings-tab">
        Settings
      </button>
      <button id="tab-custom-data" class="tab" type="button" role="tab" aria-selected="false" aria-controls="custom-data-tab">
        Custom Data
      </button>
    </nav>

    <main class="content">
      <section id="capture-tab" class="tab-panel is-active" role="tabpanel" aria-labelledby="tab-capture">
        <p class="status">Press <span class="key">Print Screen</span> to capture.</p>
        <button id="capture-now" class="capture-button" type="button">Capture an area now</button>
      </section>

      <section id="settings-tab" class="tab-panel" role="tabpanel" aria-labelledby="tab-settings" hidden>
        <form id="settings-form" class="settings">
          <div class="field">
            <span>Save directory</span>
            <div class="dir-row">
              <input id="save-directory" type="text" placeholder="Default: Images folder" />
              <button id="browse-directory" type="button">Browse…</button>
            </div>
            <button id="restore-directory" type="button" class="restore-button">
              Restore default location
            </button>
          </div>
          <label class="field">
            <span>Image format</span>
            <select id="image-format">
              <option value="png">PNG</option>
              <option value="jpeg">JPEG</option>
              <option value="bmp">BMP</option>
            </select>
          </label>

          <fieldset class="field options">
            <legend>Save &amp; copy options</legend>

            <label class="check">
              <span class="help" tabindex="0" aria-label="Help: copy to clipboard">
                ⓘ
                <span class="tooltip" role="tooltip">
                  After a capture is grabbed, the cleaned image (metadata stripped) is
                  copied to your clipboard so you can paste it anywhere.
                </span>
              </span>
              <input id="copy-to-clipboard" type="checkbox" />
              <span>Copy to clipboard</span>
            </label>

            <label class="check">
              <span class="help" tabindex="0" aria-label="Help: auto-save to Images folder">
                ⓘ
                <span class="tooltip" role="tooltip">
                  Automatically save each cleaned capture to your save directory
                  (the Images folder by default).
                </span>
              </span>
              <input id="auto-save" type="checkbox" />
              <span>Auto-save to Images folder</span>
            </label>

            <label class="check">
              <span class="help" tabindex="0" aria-label="Help: circular selection">
                ⓘ
                <span class="tooltip" role="tooltip">
                  Draw the capture region as a circle instead of a rectangle while
                  you drag-select an area.
                </span>
              </span>
              <input id="circular-selection" type="checkbox" />
              <span>Circular selection</span>
            </label>

            <label class="check">
              <span class="help" tabindex="0" aria-label="Help: ignore self">
                ?
                <span class="tooltip" role="tooltip">
                  Hide the Anonpic window from screenshots. Leave unchecked to
                  allow captures to include Anonpic itself.
                </span>
              </span>
              <input id="ignore-self" type="checkbox" />
              <span>Ignore Self</span>
            </label>

            <label class="check">
              <span class="help" tabindex="0" aria-label="Help: fill image data with custom data">
                ?
                <span class="tooltip" role="tooltip">
                  Strip image data first, then write replacement EXIF and metadata
                  values from the Custom Data tab.
                </span>
              </span>
              <input id="fill-custom-data" type="checkbox" />
              <span>Fill image data with custom data</span>
            </label>
          </fieldset>

          <button type="submit">Save settings</button>
        </form>
        <p id="settings-status" class="settings-status"></p>
      </section>

      <section id="custom-data-tab" class="tab-panel" role="tabpanel" aria-labelledby="tab-custom-data" hidden>
        <form id="custom-data-form" class="settings custom-data">
          <div class="custom-data-list">
            <label class="field custom-data-row">
              <span>EXIF</span>
              <input id="custom-exif" type="text" placeholder="Replacement EXIF value" />
            </label>

            <label class="field custom-data-row">
              <span>Metadata</span>
              <input id="custom-metadata" type="text" placeholder="Replacement metadata value" />
            </label>
          </div>

          <button id="generate-custom-data" type="button">Auto generate</button>
          <button type="submit">Save custom data</button>
        </form>
        <p id="custom-data-status" class="settings-status"></p>
      </section>
    </main>
  </body>
</html>
